# ============================================================
# 文件功能：导航菜单配置
# 控制：顶部主导航栏（main）和页脚菜单（footer）
# ============================================================

# ----- 主导航栏（顶部）-----
# 菜单项按 weight 从小到大排序
# name     = 显示文字
# pageRef  = 链接到哪个内容分区（对应 content/ 下的目录名）
# url      = 外部链接地址（与 pageRef 二选一）
# weight   = 排序权重，越小越靠前

[[main]]
  name = "博客"                    # 菜单显示名称
  pageRef = "posts"                # 链接到 /posts/
  weight = 10                      # 排第一

[[main]]
  name = "分类"
  pageRef = "categories"           # 链接到 /categories/
  weight = 20                      # 排第二
  
[[main]]
  name = "标签"
  pageRef = "tags"                 # 链接到 /tags/
  weight = 30                      # 排第三


